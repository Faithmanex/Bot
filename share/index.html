<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backtest Share · Viewer</title>
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0D0D0D;color:#EEE;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column}

  /* ── Upload screen ─────────────────────────────────────────── */
  #upload-screen{align-items:center;display:flex;flex:1;justify-content:center}
  .upload-box{background:#1A1A1A;border:2px dashed #3A3A3A;border-radius:16px;cursor:pointer;max-width:580px;padding:70px 60px;text-align:center;transition:border-color .2s,background .2s;width:100%}
  .upload-box:hover,.upload-box.dragover{border-color:#00ADB5;background:#1E1E1E}
  .upload-box .icon{color:#00ADB5;font-size:48px;margin-bottom:16px}
  .upload-box h2{color:#EEE;font-size:20px;font-weight:600;margin-bottom:8px}
  .upload-box p{color:#666;font-size:13px;line-height:1.5}
  .upload-box .ext{color:#00ADB5;font-weight:700}
  .upload-box input{display:none}

  /* ── Viewer ────────────────────────────────────────────────── */
  #viewer{display:none;flex:1;flex-direction:column;min-height:0}
  #chart-wrap{flex:1;min-height:0;position:relative}
  #chart{width:100%;height:100%}
  #title-bar{align-items:center;background:#111;border-bottom:1px solid #1E1E1E;display:flex;gap:12px;padding:8px 20px;flex-shrink:0}
  #title-bar .sym{color:#00ADB5;font-size:13px;font-weight:700}
  #title-bar .sep{color:#333}
  #title-bar .meta{color:#555;font-size:11px}
  #back-btn{background:#1E1E1E;border:1px solid #2C2C2C;border-radius:4px;color:#CCC;cursor:pointer;font-size:11px;font-weight:600;padding:5px 12px;transition:background .12s,border-color .12s}
  #back-btn:hover{background:#2A2A2A;border-color:#00ADB5;color:#FFF}
  #metrics{background:#111;border-top:1px solid #1E1E1E;display:flex;flex-shrink:0;gap:28px;padding:6px 20px}
  .met{display:flex;flex-direction:column}
  .met-lbl{color:#555;font-size:9px;letter-spacing:.8px;text-transform:uppercase}
  .met-val{color:#CCC;font-size:13px;font-weight:700;margin-top:1px}
  .pos{color:#00E676}.neg{color:#FF1744}.acc{color:#00ADB5}
  #controls{align-items:center;background:#141414;border-top:1px solid #1E1E1E;display:flex;flex-shrink:0;gap:10px;padding:7px 16px}
  button{background:#1E1E1E;border:1px solid #2C2C2C;border-radius:3px;color:#CCC;cursor:pointer;font-family:'Segoe UI',sans-serif;font-size:11px;font-weight:600;padding:5px 14px;transition:background .12s,border-color .12s}
  button:hover{background:#2A2A2A;border-color:#00ADB5;color:#FFF}
  button.play{background:#00ADB5;border-color:#00ADB5;color:#000}
  button.play:hover{background:#00C8D4}
  button.pause{background:#FF9800;border-color:#FF9800;color:#000}
  button.stop-btn{background:#1A0000;border-color:#FF1744;color:#FF1744}
  .sp-group{display:flex;gap:3px}
  .sp{padding:4px 9px;font-size:10px;min-width:32px}
  .sp.on{background:#00ADB5;border-color:#00ADB5;color:#000}
  #prog-wrap{background:#1A1A1A;border-radius:3px;cursor:pointer;flex:1;height:5px;position:relative}
  #prog-wrap:hover{background:#252525}
  #prog{background:#00ADB5;border-radius:3px;height:100%;pointer-events:none;transition:width .04s linear;width:0%}
  #prog-lbl{color:#444;font-size:9px;min-width:110px;text-align:right;white-space:nowrap}
  #title-overlay{color:#00ADB5;font-size:11px;font-weight:700;left:12px;pointer-events:none;position:absolute;text-shadow:0 1px 4px #000;top:10px;z-index:10}
  .seek-marker{cursor:pointer;height:9px;position:absolute;top:-2px;transition:transform .1s,background .1s;width:4px;z-index:5}
  .seek-marker:hover{background:#FFF!important;transform:scale(1.5);z-index:10}
  @media(max-width:640px){.upload-box{padding:40px 24px;margin:16px}.upload-box .icon{font-size:36px}}
</style>
</head>
<body>

<!-- ── Upload screen ── -->
<div id="upload-screen">
  <div class="upload-box" id="drop-zone">
    <div class="icon">📊</div>
    <h2>Upload a Backtest Share File</h2>
    <p>Drop your <span class="ext">.btshare</span> file here or <strong style="color:#EEE">click to browse</strong></p>
    <p style="margin-top:10px;color:#444;font-size:11px">Files exported from the trading bot's Live Replay tab</p>
    <input type="file" id="file-input" accept=".btshare,.json">
  </div>
</div>

<!-- ── Viewer ── -->
<div id="viewer">
  <div id="title-bar">
    <button id="back-btn">← BACK</button>
    <span class="sym" id="v-symbol">—</span>
    <span class="sep">·</span>
    <span class="meta" id="v-timeframe">—</span>
    <span class="sep">·</span>
    <span class="meta" id="v-trades">— trades</span>
  </div>

  <div id="chart-wrap">
    <div id="chart"></div>
    <div id="title-overlay">Backtest Share Viewer</div>
  </div>

  <div id="metrics">
    <div class="met"><span class="met-lbl">Balance</span><span class="met-val" id="m-bal">—</span></div>
    <div class="met"><span class="met-lbl">Net P&amp;L</span><span class="met-val" id="m-pnl">—</span></div>
    <div class="met"><span class="met-lbl">Wins</span><span class="met-val pos" id="m-wins">0</span></div>
    <div class="met"><span class="met-lbl">Losses</span><span class="met-val neg" id="m-losses">0</span></div>
    <div class="met"><span class="met-lbl">Win Rate</span><span class="met-val acc" id="m-wr">0.0%</span></div>
    <div class="met"><span class="met-lbl">Drawdown</span><span class="met-val neg" id="m-dd">0.0%</span></div>
    <div class="met" style="margin-left:auto"><span class="met-lbl">Last Trade</span><span class="met-val" id="m-last">—</span></div>
  </div>

  <div id="controls">
    <button class="stop-btn" onclick="resetReplay()">◀◀ RESET</button>
    <button id="btn-play" class="play" onclick="togglePlay()">▶ PLAY</button>
    <span style="color:#444;font-size:11px;margin-left:6px">Filter</span>
    <select id="sel-filter" onchange="changeFilter(this.value)" style="background:#1E1E1E;border:1px solid #2C2C2C;border-radius:3px;color:#CCC;cursor:pointer;font-family:'Segoe UI',sans-serif;font-size:11px;font-weight:600;outline:none;padding:4px 8px">
      <option value="all">All Setups</option>
      <option value="buys">Buys Only</option>
      <option value="sells">Sells Only</option>
    </select>
    <span style="color:#444;font-size:11px;margin-left:6px">Jump to</span>
    <select id="sel-trade" onchange="jumpToTrade(this.value)" style="background:#1E1E1E;border:1px solid #2C2C2C;border-radius:3px;color:#CCC;cursor:pointer;font-family:'Segoe UI',sans-serif;font-size:11px;font-weight:600;max-width:150px;outline:none;padding:4px 8px">
      <option value="">-- Choose Setup --</option>
    </select>
    <span style="color:#444;font-size:11px;margin-left:6px">Speed</span>
    <div class="sp-group">
      <button class="sp on"  onclick="setSpd(1,this)">1×</button>
      <button class="sp"     onclick="setSpd(5,this)">5×</button>
      <button class="sp"     onclick="setSpd(25,this)">25×</button>
      <button class="sp"     onclick="setSpd(100,this)">100×</button>
      <button class="sp"     onclick="setSpd(0,this)">∞</button>
    </div>
    <div id="prog-wrap" onclick="seekTo(event)"><div id="prog"></div></div>
    <span id="prog-lbl">0 / 0</span>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════════
//  State
// ════════════════════════════════════════════════════════════════════
let INIT_BAL = 1000;
let ALL_C = [];
let ALL_T = [];

let rIdx = 0, playing = false, spd = 1, tid = null;
let bal = INIT_BAL, peakBal = INIT_BAL, wins = 0, losses = 0, lastT = null;
let filterType = 'all';
let activeTrades = [];
let tradeSeriesList = [];
let chart = null, series = null;
let bidLine = null, askLine = null;

const fmt  = n => n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtP = n => (n>=0?'+$':'-$')+fmt(Math.abs(n));
const fmtR = n => n.toFixed(5);

// ════════════════════════════════════════════════════════════════════
//  File upload
// ════════════════════════════════════════════════════════════════════
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('click', () => fileInput.click());

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('dragover');
});
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const files = e.dataTransfer.files;
  if (files.length > 0) loadFile(files[0]);
});

fileInput.addEventListener('change', () => {
  if (fileInput.files.length > 0) loadFile(fileInput.files[0]);
});

// URL query param: ?file=<url>
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.has('file')) {
  fetch(urlParams.get('file'))
    .then(r => r.json())
    .then(data => initViewer(data))
    .catch(() => {});
}

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.version || !data.candles || !data.trades) {
        alert('Invalid .btshare file format.');
        return;
      }
      initViewer(data);
    } catch (err) {
      alert('Failed to parse file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

// ════════════════════════════════════════════════════════════════════
//  Init viewer
// ════════════════════════════════════════════════════════════════════
function initViewer(data) {
  INIT_BAL = data.meta.initial_balance || 1000;
  ALL_C = data.candles;
  ALL_T = data.trades;

  document.getElementById('upload-screen').style.display = 'none';
  document.getElementById('viewer').style.display = 'flex';

  document.getElementById('v-symbol').textContent = data.meta.symbol || '—';
  document.getElementById('v-timeframe').textContent = data.meta.timeframe || '—';
  document.getElementById('v-trades').textContent = ALL_T.length + ' trades';

  // ── Chart ──
  chart = LightweightCharts.createChart(document.getElementById('chart'), {
    layout:         {background:{type:'solid',color:'#0D0D0D'}, textColor:'#666'},
    grid:           {vertLines:{color:'#141414'}, horzLines:{color:'#141414'}},
    rightPriceScale:{borderColor:'#1E1E1E'},
    timeScale:      {borderColor:'#1E1E1E', timeVisible:true, secondsVisible:false, rightOffset:12},
    crosshair:      {mode:LightweightCharts.CrosshairMode.Normal},
  });
  series = chart.addCandlestickSeries({
    upColor:'#00E676', downColor:'#FF1744',
    borderUpColor:'#00E676', borderDownColor:'#FF1744',
    wickUpColor:'#00C853',   wickDownColor:'#D50000',
  });

  new ResizeObserver(() => chart.resize(
    document.getElementById('chart').clientWidth,
    document.getElementById('chart').clientHeight
  )).observe(document.getElementById('chart'));

  // ── Pre-calc trade lifecycles ──
  initTradeLifecycles();
  drawSeekMarkers();
  drawTradeDropdown();
  resetReplay();
}

// ════════════════════════════════════════════════════════════════════
//  Trade lifecycle calculation
// ════════════════════════════════════════════════════════════════════
function initTradeLifecycles() {
  for (let t of ALL_T) {
    t.sigIdx = ALL_C.findIndex(c => c.time === t.time);
    if (t.sigIdx === -1) continue;

    const isBuy = t.type === 'buy';

    t.entryIdx = -1;
    for (let i = t.sigIdx + 1; i < ALL_C.length; i++) {
      const c = ALL_C[i];
      if (isBuy) { if (c.low <= t.entry) { t.entryIdx = i; break; } }
      else       { if (c.high >= t.entry) { t.entryIdx = i; break; } }
    }

    t.exitIdx = -1;
    t.exitReason = null;
    if (t.entryIdx !== -1) {
      for (let i = t.entryIdx; i < ALL_C.length; i++) {
        const c = ALL_C[i];
        if (isBuy) {
          const hitSL = c.low <= t.sl;
          const hitTP = c.high >= t.tp;
          if (hitSL && t.result === 'SL') { t.exitIdx = i; t.exitReason = 'SL'; break; }
          else if (hitTP && t.result === 'TP') { t.exitIdx = i; t.exitReason = 'TP'; break; }
          else if (hitSL || hitTP) { t.exitIdx = i; t.exitReason = hitSL ? 'SL' : 'TP'; break; }
        } else {
          const hitSL = c.high >= t.sl;
          const hitTP = c.low <= t.tp;
          if (hitSL && t.result === 'SL') { t.exitIdx = i; t.exitReason = 'SL'; break; }
          else if (hitTP && t.result === 'TP') { t.exitIdx = i; t.exitReason = 'TP'; break; }
          else if (hitSL || hitTP) { t.exitIdx = i; t.exitReason = hitSL ? 'SL' : 'TP'; break; }
        }
      }
    }
  }
  activeTrades = [...ALL_T];
  resetReplay();
}

function drawSeekMarkers() {
  const progWrap = document.getElementById('prog-wrap');
  document.querySelectorAll('.seek-marker').forEach(m => m.remove());
  for (let t of activeTrades) {
    if (t.sigIdx === -1) continue;
    const idx = t.entryIdx !== -1 ? t.entryIdx : t.sigIdx;
    const pct = (idx / ALL_C.length) * 100;
    const marker = document.createElement('div');
    marker.className = 'seek-marker';
    marker.style.left = pct + '%';
    const isTP = t.result === 'TP';
    marker.style.background = t.entryIdx !== -1 ? (isTP ? '#00E676' : '#FF1744') : '#00B0FF';
    marker.title = (t.entryIdx !== -1 ? t.result : 'PENDING') + ' @ ' + fmtR(t.entry) + ' (Click)';
    marker.addEventListener('click', e => {
      e.stopPropagation();
      const target = t.entryIdx !== -1 ? Math.max(0, t.entryIdx - 10) : Math.max(0, t.sigIdx - 5);
      resetReplay();
      advance(target);
      chart.timeScale().scrollToRealTime();
    });
    progWrap.appendChild(marker);
  }
}

function changeFilter(type) {
  filterType = type;
  if (type === 'all')    activeTrades = ALL_T;
  else if (type === 'buys')  activeTrades = ALL_T.filter(t => t.type === 'buy');
  else if (type === 'sells') activeTrades = ALL_T.filter(t => t.type === 'sell');
  resetReplay();
  drawSeekMarkers();
  drawTradeDropdown();
}

function drawTradeDropdown() {
  const sel = document.getElementById('sel-trade');
  sel.innerHTML = '<option value="">-- Choose Setup --</option>';
  activeTrades.forEach((t, i) => {
    if (t.sigIdx === -1) return;
    const typeStr = t.type === 'buy' ? 'BUY' : 'SELL';
    const d = new Date(t.time * 1000);
    const dateStr = d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0') + ' ' +
      String(d.getHours()).padStart(2,'0') + ':' +
      String(d.getMinutes()).padStart(2,'0');
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = '#' + (i+1) + ': ' + typeStr + ' ' + t.result + ' @ ' + fmtR(t.entry) + ' (' + dateStr + ')';
    sel.appendChild(opt);
  });
}

function jumpToTrade(idxStr) {
  if (idxStr === '') return;
  const t = activeTrades[parseInt(idxStr)];
  if (!t) return;
  const target = t.entryIdx !== -1 ? Math.max(0, t.entryIdx - 10) : Math.max(0, t.sigIdx - 5);
  resetReplay();
  advance(target);
  chart.timeScale().scrollToRealTime();
  document.getElementById('sel-trade').value = '';
}

// ════════════════════════════════════════════════════════════════════
//  Metrics & State
// ════════════════════════════════════════════════════════════════════
function updStateAndMetrics() {
  bal = INIT_BAL; peakBal = INIT_BAL; wins = 0; losses = 0; lastT = null;
  for (let t of activeTrades) {
    if (t.sigIdx === -1) continue;
    if (t.exitIdx !== -1 && rIdx >= t.exitIdx) {
      bal = t.balance;
      if (bal > peakBal) peakBal = bal;
      if (t.result === 'TP') wins++; else losses++;
      lastT = t;
    }
  }
  const pnl = bal - INIT_BAL;
  const tot = wins + losses;
  const wr = tot > 0 ? (wins / tot * 100).toFixed(1) : '0.0';
  const dd = peakBal > 0 ? ((peakBal - bal) / peakBal * 100).toFixed(1) : '0.0';

  document.getElementById('m-bal').textContent  = '$' + fmt(bal);
  const pe = document.getElementById('m-pnl');
  pe.textContent = fmtP(pnl);
  pe.className = 'met-val ' + (pnl >= 0 ? 'pos' : 'neg');
  document.getElementById('m-wins').textContent   = wins;
  document.getElementById('m-losses').textContent = losses;
  document.getElementById('m-wr').textContent     = wr + '%';
  document.getElementById('m-dd').textContent     = dd + '%';

  if (lastT) {
    const le = document.getElementById('m-last');
    le.textContent = lastT.result + ' @ ' + fmtR(lastT.entry);
    le.className = 'met-val ' + (lastT.result === 'TP' ? 'pos' : 'neg');
  } else {
    const le = document.getElementById('m-last');
    le.textContent = '—';
    le.className = 'met-val';
  }

  const pct = ALL_C.length > 0 ? rIdx / ALL_C.length * 100 : 0;
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('prog-lbl').textContent = rIdx.toLocaleString() + ' / ' + ALL_C.length.toLocaleString();
}

// ════════════════════════════════════════════════════════════════════
//  Trade level lines
// ════════════════════════════════════════════════════════════════════
function updTradeSeries() {
  for (let t of ALL_T) {
    if (t.sigIdx === -1) continue;
    const isActive = activeTrades.includes(t);
    if (rIdx < t.sigIdx || !isActive) {
      if (t.seriesCreated) {
        chart.removeSeries(t.entrySeries); chart.removeSeries(t.tpSeries); chart.removeSeries(t.slSeries);
        t.seriesCreated = false;
      }
      continue;
    }
    if (!t.seriesCreated) {
      t.entrySeries = chart.addLineSeries({color:'#00B0FF',lineWidth:2,lineStyle:LightweightCharts.LineStyle.Solid,priceLineVisible:false,lastPriceAnimationMode:LightweightCharts.LastPriceAnimationMode.Disabled,crosshairMarkerVisible:false});
      t.tpSeries = chart.addLineSeries({color:'#00E676',lineWidth:1.5,lineStyle:LightweightCharts.LineStyle.Dashed,priceLineVisible:false,lastPriceAnimationMode:LightweightCharts.LastPriceAnimationMode.Disabled,crosshairMarkerVisible:false});
      t.slSeries = chart.addLineSeries({color:'#FF1744',lineWidth:1.5,lineStyle:LightweightCharts.LineStyle.Dashed,priceLineVisible:false,lastPriceAnimationMode:LightweightCharts.LastPriceAnimationMode.Disabled,crosshairMarkerVisible:false});
      t.seriesCreated = true;
      tradeSeriesList.push(t);
    }
    const start = t.sigIdx;
    let end = rIdx;
    if (t.exitIdx !== -1 && rIdx >= t.exitIdx) end = t.exitIdx;
    const entryData=[], tpData=[], slData=[];
    for (let i = start; i <= end; i++) {
      const time = ALL_C[i].time;
      entryData.push({time,value:t.entry});
      tpData.push({time,value:t.tp});
      slData.push({time,value:t.sl});
    }
    t.entrySeries.setData(entryData);
    t.tpSeries.setData(tpData);
    t.slSeries.setData(slData);
  }
}

function updMarkers() {
  const activeMarkers = [];
  for (let t of activeTrades) {
    if (t.sigIdx === -1) continue;
    if (rIdx >= t.sigIdx) {
      activeMarkers.push({time:t.time,position:t.type==='buy'?'belowBar':'aboveBar',color:'#00B0FF',shape:t.type==='buy'?'arrowUp':'arrowDown',text:(t.type==='buy'?'BUY':'SELL')+' LIMIT @ '+fmtR(t.entry)});
    }
    if (t.entryIdx !== -1 && rIdx >= t.entryIdx) {
      activeMarkers.push({time:ALL_C[t.entryIdx].time,position:'belowBar',color:'#FFD600',shape:'circle',text:'FILLED @ '+fmtR(t.entry)});
    }
    if (t.exitIdx !== -1 && rIdx >= t.exitIdx) {
      const isTP = t.exitReason === 'TP';
      activeMarkers.push({time:ALL_C[t.exitIdx].time,position:isTP?'aboveBar':'belowBar',color:isTP?'#00E676':'#FF1744',shape:isTP?'arrowUp':'arrowDown',text:t.exitReason+' @ '+fmtR(isTP?t.tp:t.sl)});
    }
  }
  activeMarkers.sort((a,b)=>a.time-b.time);
  series.setMarkers(activeMarkers);
}

// ════════════════════════════════════════════════════════════════════
//  Advance / Playback
// ════════════════════════════════════════════════════════════════════
function advance(n) {
  rIdx = Math.min(rIdx + n, ALL_C.length);
  series.setData(ALL_C.slice(0, rIdx));

  if (bidLine) { series.removePriceLine(bidLine); bidLine = null; }
  if (askLine) { series.removePriceLine(askLine); askLine = null; }

  if (rIdx > 0) {
    const cur = ALL_C[rIdx - 1];
    bidLine = series.createPriceLine({price:cur.close,color:'#FF1744',lineWidth:1.5,lineStyle:LightweightCharts.LineStyle.Dotted,axisLabelVisible:true,title:'BID'});
    askLine = series.createPriceLine({price:cur.ask||cur.close,color:'#00B0FF',lineWidth:1.5,lineStyle:LightweightCharts.LineStyle.Dotted,axisLabelVisible:true,title:'ASK'});
  }
  updTradeSeries();
  updMarkers();
  updStateAndMetrics();
}

function tick() {
  if (!playing) return;
  if (rIdx >= ALL_C.length) {
    playing = false;
    const b = document.getElementById('btn-play');
    b.textContent = '▶ PLAY'; b.className = 'play';
    updStateAndMetrics(); return;
  }
  if (spd === 0) {
    advance(ALL_C.length - rIdx);
    chart.timeScale().scrollToRealTime();
    playing = false;
    const b = document.getElementById('btn-play');
    b.textContent = '▶ PLAY'; b.className = 'play';
    return;
  } else {
    advance(spd);
    chart.timeScale().scrollToRealTime();
    const dl = spd <= 1 ? 80 : spd <= 5 ? 28 : spd <= 25 ? 10 : 3;
    tid = setTimeout(tick, dl);
  }
}

function togglePlay() {
  playing = !playing;
  const b = document.getElementById('btn-play');
  if (playing) { b.textContent = '⏸ PAUSE'; b.className = 'pause'; tick(); }
  else { b.textContent = '▶ PLAY'; b.className = 'play'; clearTimeout(tid); }
}

function resetReplay() {
  playing = false; clearTimeout(tid);
  rIdx = 0;
  tradeSeriesList.forEach(s => { chart.removeSeries(s.entrySeries); chart.removeSeries(s.tpSeries); chart.removeSeries(s.slSeries); });
  tradeSeriesList = [];
  for (let t of ALL_T) { t.seriesCreated = false; t.entrySeries = null; t.tpSeries = null; t.slSeries = null; }
  if (bidLine) { series.removePriceLine(bidLine); bidLine = null; }
  if (askLine) { series.removePriceLine(askLine); askLine = null; }
  series.setData([]);
  series.setMarkers([]);
  document.getElementById('btn-play').textContent = '▶ PLAY';
  document.getElementById('btn-play').className = 'play';
  updStateAndMetrics();
}

function setSpd(s, el) {
  spd = s;
  document.querySelectorAll('.sp').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
}

function seekTo(e) {
  const r = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - r.left) / r.width;
  const tgt = Math.floor(pct * ALL_C.length);
  if (tgt <= rIdx) return;
  advance(tgt - rIdx);
  updStateAndMetrics();
  chart.timeScale().scrollToRealTime();
}

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.key === ' ') { e.preventDefault(); togglePlay(); }
  else if ((e.key === 'ArrowRight' || e.key==='d' || e.key==='D') && !playing && rIdx < ALL_C.length) {
    e.preventDefault(); advance(1); updStateAndMetrics(); chart.timeScale().scrollToRealTime();
  }
  else if (e.key === 'Escape' || e.key==='r' || e.key==='R') { resetReplay(); }
});

// Back button
document.getElementById('back-btn').addEventListener('click', () => {
  if (chart) { chart.remove(); chart = null; series = null; }
  document.getElementById('viewer').style.display = 'none';
  document.getElementById('upload-screen').style.display = 'flex';
  ALL_C = [];
  ALL_T = [];
  activeTrades = [];
  tradeSeriesList = [];
  rIdx = 0; playing = false;
});
</script>
</body>
</html>
